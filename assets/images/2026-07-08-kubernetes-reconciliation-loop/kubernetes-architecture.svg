<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Kubernetes Architecture</title>
  <desc id="desc">Control Plane and Worker Nodes architecture diagram</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .box{fill:#fff;stroke:#1d4ed8;stroke-width:3;rx:18}
      .group{fill:#eff6ff;stroke:#2563eb;stroke-width:3;rx:24}
      .worker{fill:#f0fdf4;stroke:#16a34a;stroke-width:3;rx:24}
      .store{fill:#faf5ff;stroke:#7c3aed;stroke-width:3;rx:18}
      .text{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#0f172a;font-size:30px;font-weight:700}
      .small{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#334155;font-size:22px;font-weight:600}
      .line{stroke:#2563eb;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .both{stroke:#2563eb;stroke-width:4;fill:none;marker-start:url(#arrow);marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>

  <rect class="box" x="80" y="360" width="240" height="130"/>
  <text class="text" x="200" y="420" text-anchor="middle">Developer / CI</text>
  <text class="small" x="200" y="458" text-anchor="middle">YAML Spec</text>

  <rect class="group" x="410" y="120" width="520" height="640"/>
  <text class="text" x="670" y="175" text-anchor="middle">Control Plane</text>

  <rect class="box" x="560" y="230" width="220" height="90"/>
  <text class="text" x="670" y="287" text-anchor="middle">API Server</text>

  <rect class="store" x="560" y="390" width="220" height="90"/>
  <text class="text" x="670" y="447" text-anchor="middle">etcd</text>

  <rect class="box" x="465" y="560" width="190" height="90"/>
  <text class="small" x="560" y="613" text-anchor="middle">Scheduler</text>

  <rect class="box" x="685" y="560" width="190" height="90"/>
  <text class="small" x="780" y="598" text-anchor="middle">Controller</text>
  <text class="small" x="780" y="628" text-anchor="middle">Manager</text>

  <rect class="worker" x="1010" y="120" width="250" height="640"/>
  <text class="text" x="1135" y="175" text-anchor="middle">Worker Node A</text>

  <rect class="box" x="1045" y="230" width="180" height="75"/>
  <text class="small" x="1135" y="277" text-anchor="middle">kubelet</text>
  <rect class="box" x="1045" y="335" width="180" height="75"/>
  <text class="small" x="1135" y="382" text-anchor="middle">kube-proxy</text>
  <rect class="box" x="1045" y="440" width="180" height="75"/>
  <text class="small" x="1135" y="487" text-anchor="middle">Runtime</text>
  <rect class="box" x="1045" y="545" width="180" height="90"/>
  <text class="small" x="1135" y="598" text-anchor="middle">Pods</text>

  <rect class="worker" x="1310" y="120" width="250" height="640"/>
  <text class="text" x="1435" y="175" text-anchor="middle">Worker Node B</text>

  <rect class="box" x="1345" y="230" width="180" height="75"/>
  <text class="small" x="1435" y="277" text-anchor="middle">kubelet</text>
  <rect class="box" x="1345" y="335" width="180" height="75"/>
  <text class="small" x="1435" y="382" text-anchor="middle">kube-proxy</text>
  <rect class="box" x="1345" y="440" width="180" height="75"/>
  <text class="small" x="1435" y="487" text-anchor="middle">Runtime</text>
  <rect class="box" x="1345" y="545" width="180" height="90"/>
  <text class="small" x="1435" y="598" text-anchor="middle">Pods</text>

  <path class="line" d="M320 425 H555"/>
  <path class="both" d="M670 320 V390"/>
  <path class="line" d="M560 560 L620 320"/>
  <path class="line" d="M780 560 L720 320"/>
  <path class="both" d="M780 275 H1045"/>
  <path class="both" d="M780 275 H1345"/>
  <path class="line" d="M1135 305 V440"/>
  <path class="line" d="M1135 515 V545"/>
  <path class="line" d="M1435 305 V440"/>
  <path class="line" d="M1435 515 V545"/>

  <text class="small" x="800" y="830" text-anchor="middle">Control Plane decides and reconciles. Worker Nodes run workloads.</text>
</svg>
