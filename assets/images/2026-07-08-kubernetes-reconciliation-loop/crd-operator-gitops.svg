<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">CRD Operator GitOps Extension</title>
  <desc id="desc">Kubernetes extension pattern through CRD Operator and GitOps</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .box{fill:#fff;stroke:#2563eb;stroke-width:4;rx:20}
      .git{fill:#f0fdf4;stroke:#16a34a;stroke-width:4;rx:20}
      .cluster{fill:#eff6ff;stroke:#2563eb;stroke-width:4;rx:26}
      .custom{fill:#faf5ff;stroke:#7c3aed;stroke-width:4;rx:20}
      .run{fill:#fff7ed;stroke:#f97316;stroke-width:4;rx:20}
      .text{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#0f172a;font-size:32px;font-weight:800}
      .small{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#475569;font-size:22px;font-weight:600}
      .line{stroke:#2563eb;stroke-width:5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>

  <rect class="git" x="70" y="335" width="250" height="140"/>
  <text class="text" x="195" y="390" text-anchor="middle">Git Repository</text>
  <text class="small" x="195" y="430" text-anchor="middle">Desired State in Git</text>

  <rect class="box" x="400" y="335" width="270" height="140"/>
  <text class="text" x="535" y="388" text-anchor="middle">GitOps</text>
  <text class="text" x="535" y="426" text-anchor="middle">Controller</text>

  <rect class="cluster" x="750" y="110" width="520" height="610"/>
  <text class="text" x="1010" y="165" text-anchor="middle">Kubernetes Cluster</text>

  <rect class="box" x="880" y="220" width="260" height="105"/>
  <text class="text" x="1010" y="285" text-anchor="middle">API Server</text>

  <rect class="box" x="815" y="390" width="190" height="105"/>
  <text class="small" x="910" y="430" text-anchor="middle">Built-in</text>
  <text class="small" x="910" y="460" text-anchor="middle">Resources</text>

  <rect class="custom" x="1035" y="390" width="190" height="105"/>
  <text class="small" x="1130" y="430" text-anchor="middle">Custom</text>
  <text class="small" x="1130" y="460" text-anchor="middle">Resources</text>
  <text class="small" x="1130" y="488" text-anchor="middle">CRD</text>

  <rect class="custom" x="1035" y="560" width="190" height="95"/>
  <text class="text" x="1130" y="620" text-anchor="middle">Operator</text>

  <rect class="run" x="1350" y="335" width="200" height="210"/>
  <text class="text" x="1450" y="390" text-anchor="middle">Running</text>
  <text class="text" x="1450" y="428" text-anchor="middle">System</text>
  <text class="small" x="1450" y="472" text-anchor="middle">Pods</text>
  <text class="small" x="1450" y="502" text-anchor="middle">Services</text>
  <text class="small" x="1450" y="532" text-anchor="middle">Databases</text>

  <path class="line" d="M320 405 H400"/>
  <path class="line" d="M670 405 H880 V325"/>
  <path class="line" d="M1010 325 V390"/>
  <path class="line" d="M1030 325 L1130 390"/>
  <path class="line" d="M1130 495 V560"/>
  <path class="line" d="M1225 607 H1350"/>
  <path class="line" d="M1005 442 H1350"/>

  <text class="small" x="800" y="810" text-anchor="middle">Same reconciliation pattern, higher level.</text>
</svg>
