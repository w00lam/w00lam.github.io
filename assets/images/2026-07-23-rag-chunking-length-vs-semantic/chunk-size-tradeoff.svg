<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">청크 크기에 따른 문제 비교</title>
  <desc id="desc">청크가 너무 작을 때, 적절할 때, 너무 클 때 검색 품질에 어떤 영향을 주는지 비교한 도식</desc>
  <rect width="1200" height="680" rx="28" fill="#f8fafc"/>
  <text x="70" y="82" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="34" font-weight="700" fill="#0f172a">청크 크기는 검색 품질을 직접 바꾼다</text>
  <text x="72" y="120" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="18" fill="#64748b">너무 작아도, 너무 커도 답변에 필요한 문맥을 온전히 전달하지 못한다.</text>

  <g>
    <rect x="70" y="174" width="320" height="430" rx="22" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="230" y="224" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="24" font-weight="700" fill="#9a3412">너무 작음</text>
    <g fill="#ffffff" stroke="#fb923c">
      <rect x="112" y="274" width="64" height="56" rx="10"/>
      <rect x="194" y="274" width="64" height="56" rx="10"/>
      <rect x="276" y="274" width="64" height="56" rx="10"/>
      <rect x="112" y="352" width="64" height="56" rx="10"/>
      <rect x="194" y="352" width="64" height="56" rx="10"/>
      <rect x="276" y="352" width="64" height="56" rx="10"/>
    </g>
    <text x="230" y="450" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="18" font-weight="700" fill="#7c2d12">문맥 단절</text>
    <text x="230" y="482" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="15" fill="#475569">문맥이 여러 조각으로</text>
    <text x="230" y="506" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="15" fill="#475569">끊긴다</text>
  </g>

  <g>
    <rect x="440" y="174" width="320" height="430" rx="22" fill="#ecfdf5" stroke="#bbf7d0"/>
    <text x="600" y="224" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="24" font-weight="700" fill="#166534">적절함</text>
    <g fill="#ffffff" stroke="#22c55e">
      <rect x="492" y="286" width="216" height="58" rx="12"/>
      <rect x="492" y="364" width="216" height="58" rx="12"/>
    </g>
    <line x1="524" y1="315" x2="676" y2="315" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <line x1="524" y1="393" x2="676" y2="393" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <text x="600" y="450" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="18" font-weight="700" fill="#14532d">문맥 유지</text>
    <text x="600" y="482" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="15" fill="#475569">질문에 필요한 내용이</text>
    <text x="600" y="506" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="15" fill="#475569">하나의 단위로 유지된다</text>
  </g>

  <g>
    <rect x="810" y="174" width="320" height="430" rx="22" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="970" y="224" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="24" font-weight="700" fill="#1d4ed8">너무 큼</text>
    <rect x="865" y="276" width="210" height="146" rx="16" fill="#ffffff" stroke="#60a5fa"/>
    <circle cx="914" cy="326" r="22" fill="#bae6fd"/>
    <circle cx="970" cy="348" r="22" fill="#bbf7d0"/>
    <circle cx="1026" cy="326" r="22" fill="#fed7aa"/>
    <line x1="900" y1="386" x2="1040" y2="386" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <text x="970" y="450" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="18" font-weight="700" fill="#1e3a8a">주제 혼재</text>
    <text x="970" y="482" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="15" fill="#475569">관련 없는 내용까지</text>
    <text x="970" y="506" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="15" fill="#475569">함께 포함된다</text>
  </g>
</svg>
