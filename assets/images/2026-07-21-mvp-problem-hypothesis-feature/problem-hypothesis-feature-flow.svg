<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">문제, 가설, 기능, 검증 결과의 관계</title>
  <desc id="desc">사용자 문제에서 가설과 기능을 거쳐 검증 결과를 얻고, 유지·수정·중단·확장 중 다음 판단으로 이어지는 흐름도</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1600" height="760" fill="#f8fafc"/>
  <text x="800" y="78" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="38" font-weight="700" fill="#0f172a">기능은 가설을 검증하기 위한 수단이다</text>
  <text x="800" y="122" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="22" fill="#64748b">검증 결과를 확인한 뒤 다음 범위를 판단한다</text>

  <g filter="url(#shadow)">
    <rect x="80" y="210" width="310" height="220" rx="24" fill="#ffffff" stroke="#f97316" stroke-width="3"/>
    <rect x="80" y="210" width="310" height="62" rx="24" fill="#fff7ed"/>
    <text x="235" y="252" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="27" font-weight="700" fill="#c2410c">문제</text>
    <text x="235" y="319" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="22" font-weight="600" fill="#334155">사용자가 실제로 겪는</text>
    <text x="235" y="352" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="22" font-weight="600" fill="#334155">불편과 어려움</text>
    <text x="235" y="397" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="18" fill="#64748b">예: 방문 순서를 정하기 어렵다</text>

    <rect x="485" y="210" width="310" height="220" rx="24" fill="#ffffff" stroke="#8b5cf6" stroke-width="3"/>
    <rect x="485" y="210" width="310" height="62" rx="24" fill="#f5f3ff"/>
    <text x="640" y="252" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="27" font-weight="700" fill="#6d28d9">가설</text>
    <text x="640" y="319" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="22" font-weight="600" fill="#334155">문제를 해결할 수 있다고</text>
    <text x="640" y="352" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="22" font-weight="600" fill="#334155">예상한 방법</text>
    <text x="640" y="397" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="18" fill="#64748b">예: 동선을 자동 생성한다</text>

    <rect x="890" y="210" width="310" height="220" rx="24" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
    <rect x="890" y="210" width="310" height="62" rx="24" fill="#eff6ff"/>
    <text x="1045" y="252" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="27" font-weight="700" fill="#1d4ed8">기능</text>
    <text x="1045" y="319" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="22" font-weight="600" fill="#334155">가설을 확인하기 위해</text>
    <text x="1045" y="352" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="22" font-weight="600" fill="#334155">구현하는 수단</text>
    <text x="1045" y="397" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="18" fill="#64748b">예: 장소 선택과 순서 생성</text>

    <rect x="1295" y="210" width="225" height="220" rx="24" fill="#ffffff" stroke="#10b981" stroke-width="3"/>
    <rect x="1295" y="210" width="225" height="62" rx="24" fill="#ecfdf5"/>
    <text x="1408" y="252" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="27" font-weight="700" fill="#047857">검증 결과</text>
    <text x="1408" y="319" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="21" font-weight="600" fill="#334155">사용자의 반응과</text>
    <text x="1408" y="352" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="21" font-weight="600" fill="#334155">행동으로 확인</text>
    <text x="1408" y="397" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="18" fill="#64748b">가설을 판단할 근거</text>
  </g>

  <line x1="406" y1="320" x2="463" y2="320" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="811" y1="320" x2="868" y2="320" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1216" y1="320" x2="1273" y2="320" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M1408 450 V515 H800" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <rect x="525" y="500" width="550" height="126" rx="24" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="800" y="548" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="25" font-weight="700" fill="#1e3a8a">다음 판단</text>
  <text x="800" y="592" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="22" fill="#1d4ed8">유지 · 수정 · 중단 · 다음 가설로 확장</text>
  <path d="M525 563 H400 C330 563 330 482 485 482" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="10 9" marker-end="url(#arrow)"/>
  <text x="300" y="650" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="18" fill="#64748b">결과에 따라 가설을 다시 조정</text>
</svg>
