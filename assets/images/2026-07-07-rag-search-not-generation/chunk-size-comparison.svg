<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">청크 크기 비교</title>
  <desc id="desc">너무 작은 청크, 적절한 청크, 너무 큰 청크가 검색 품질에 미치는 영향을 비교한 도식</desc>
  <rect width="1200" height="680" rx="28" fill="#f8fafc"/>
  <text x="70" y="82" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="34" font-weight="700" fill="#0f172a">청크 크기는 검색 품질을 직접 바꾼다</text>
  <text x="72" y="120" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="18" fill="#64748b">청크는 검색되는 단위이자 LLM에게 전달되는 근거의 단위다.</text>

  <g>
    <rect x="70" y="174" width="320" height="410" rx="22" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="230" y="224" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="24" font-weight="700" fill="#9a3412">너무 작은 청크</text>
    <g fill="#ffffff" stroke="#fb923c">
      <rect x="112" y="274" width="64" height="56" rx="10"/>
      <rect x="194" y="274" width="64" height="56" rx="10"/>
      <rect x="276" y="274" width="64" height="56" rx="10"/>
      <rect x="112" y="352" width="64" height="56" rx="10"/>
      <rect x="194" y="352" width="64" height="56" rx="10"/>
      <rect x="276" y="352" width="64" height="56" rx="10"/>
    </g>
    <text x="230" y="462" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="18" font-weight="700" fill="#7c2d12">문맥 단절</text>
    <text x="230" y="494" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="15" fill="#475569">검색은 되지만</text>
    <text x="230" y="518" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="15" fill="#475569">답변에 필요한 앞뒤 맥락이 부족하다</text>
  </g>

  <g>
    <rect x="440" y="174" width="320" height="410" rx="22" fill="#ecfdf5" stroke="#bbf7d0"/>
    <text x="600" y="224" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="24" font-weight="700" fill="#166534">적절한 청크</text>
    <g fill="#ffffff" stroke="#22c55e">
      <rect x="492" y="286" width="216" height="58" rx="12"/>
      <rect x="492" y="364" width="216" height="58" rx="12"/>
    </g>
    <line x1="524" y1="315" x2="676" y2="315" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <line x1="524" y1="393" x2="676" y2="393" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <text x="600" y="462" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="18" font-weight="700" fill="#14532d">의미 단위 유지</text>
    <text x="600" y="494" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="15" fill="#475569">하나의 근거로 읽을 수 있고</text>
    <text x="600" y="518" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="15" fill="#475569">검색 의도와도 잘 맞는다</text>
  </g>

  <g>
    <rect x="810" y="174" width="320" height="410" rx="22" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="970" y="224" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="24" font-weight="700" fill="#1d4ed8">너무 큰 청크</text>
    <rect x="865" y="276" width="210" height="146" rx="16" fill="#ffffff" stroke="#60a5fa"/>
    <circle cx="914" cy="326" r="22" fill="#bae6fd"/>
    <circle cx="970" cy="348" r="22" fill="#bbf7d0"/>
    <circle cx="1026" cy="326" r="22" fill="#fed7aa"/>
    <line x1="900" y1="386" x2="1040" y2="386" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <text x="970" y="462" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="18" font-weight="700" fill="#1e3a8a">주제 섞임</text>
    <text x="970" y="494" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="15" fill="#475569">한 벡터 안에 여러 의미가 섞여</text>
    <text x="970" y="518" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="15" fill="#475569">검색 정확도가 떨어진다</text>
  </g>
</svg>
