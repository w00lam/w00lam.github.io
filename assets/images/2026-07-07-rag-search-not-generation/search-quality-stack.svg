<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">검색 품질 보강 스택</title>
  <desc id="desc">질문에서 벡터 검색과 키워드 검색을 병렬로 수행하고 RRF 병합과 리랭킹을 거쳐 최종 topK를 고르는 구조</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1200" height="620" rx="28" fill="#f8fafc"/>
  <text x="70" y="78" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="34" font-weight="700" fill="#0f172a">검색 품질 보강 스택</text>
  <text x="72" y="116" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="18" fill="#64748b">벡터 검색만 믿기보다 키워드 검색, 병합, 리랭킹을 조합해 최종 근거를 고른다.</text>

  <g filter="url(#shadow)" font-family="Arial, 'Noto Sans KR', sans-serif">
    <rect x="90" y="270" width="150" height="86" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="165" y="322" text-anchor="middle" font-size="22" font-weight="700" fill="#1d4ed8">질문</text>

    <rect x="345" y="190" width="190" height="86" rx="18" fill="#f0fdfa" stroke="#99f6e4"/>
    <text x="440" y="224" text-anchor="middle" font-size="21" font-weight="700" fill="#115e59">벡터 검색</text>
    <text x="440" y="252" text-anchor="middle" font-size="15" fill="#475569">의미 유사도</text>

    <rect x="345" y="350" width="190" height="86" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="440" y="384" text-anchor="middle" font-size="21" font-weight="700" fill="#9a3412">키워드 검색</text>
    <text x="440" y="412" text-anchor="middle" font-size="15" fill="#475569">정확한 문자열</text>

    <rect x="635" y="270" width="170" height="86" rx="18" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="720" y="304" text-anchor="middle" font-size="21" font-weight="700" fill="#334155">RRF 병합</text>
    <text x="720" y="332" text-anchor="middle" font-size="15" fill="#475569">순위 기반 결합</text>

    <rect x="890" y="270" width="150" height="86" rx="18" fill="#ecfdf5" stroke="#bbf7d0"/>
    <text x="965" y="304" text-anchor="middle" font-size="21" font-weight="700" fill="#166534">리랭킹</text>
    <text x="965" y="332" text-anchor="middle" font-size="15" fill="#475569">정밀 판단</text>

    <rect x="890" y="460" width="150" height="74" rx="18" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="965" y="506" text-anchor="middle" font-size="22" font-weight="700" fill="#3730a3">최종 topK</text>
  </g>
  <path d="M 244 305 C 286 282, 300 242, 336 232" stroke="#0f766e" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 244 321 C 286 342, 300 382, 336 392" stroke="#0f766e" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 540 233 C 590 248, 610 284, 626 303" stroke="#0f766e" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 540 393 C 590 378, 610 342, 626 323" stroke="#0f766e" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 810 313 L 881 313" stroke="#0f766e" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 965 360 L 965 451" stroke="#0f766e" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
</svg>
