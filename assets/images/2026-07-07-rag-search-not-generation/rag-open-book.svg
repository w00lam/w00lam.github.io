<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">RAG 오픈북 시험 비유</title>
  <desc id="desc">사용자 질문이 검색 단계를 거쳐 관련 문서 근거를 찾고, 그 근거가 LLM 답변에 함께 들어가는 과정을 오픈북 시험처럼 표현한 도식</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1200" height="640" rx="28" fill="#f8fafc"/>
  <rect x="44" y="44" width="1112" height="552" rx="24" fill="#ffffff" stroke="#d8e2ef"/>

  <text x="76" y="96" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="34" font-weight="700" fill="#0f172a">RAG는 모델을 외우게 하는 것이 아니라, 답변 전에 근거를 펴놓게 하는 구조</text>
  <text x="78" y="132" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="18" fill="#64748b">오픈북 시험처럼 질문과 함께 관련 문서를 찾아 LLM에게 전달한다.</text>

  <g filter="url(#shadow)">
    <rect x="76" y="224" width="220" height="150" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="186" y="282" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">질문</text>
    <text x="186" y="318" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="16" fill="#334155">연차는 언제까지</text>
    <text x="186" y="342" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="16" fill="#334155">신청해야 할까?</text>
  </g>

  <path d="M 316 299 L 420 299" stroke="#2563eb" stroke-width="5" fill="none" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="430" y="184" width="270" height="230" rx="20" fill="#f0fdfa" stroke="#99f6e4"/>
    <text x="565" y="226" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="24" font-weight="700" fill="#115e59">검색</text>
    <rect x="474" y="258" width="182" height="34" rx="8" fill="#ffffff" stroke="#5eead4"/>
    <rect x="474" y="306" width="156" height="34" rx="8" fill="#ffffff" stroke="#5eead4"/>
    <rect x="474" y="354" width="198" height="34" rx="8" fill="#ffffff" stroke="#5eead4"/>
    <text x="565" y="464" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="16" fill="#475569">Vector DB / 키워드 검색 / 필터링</text>
  </g>

  <path d="M 710 299 L 814 299" stroke="#2563eb" stroke-width="5" fill="none" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <path d="M 848 203 C 892 184, 928 184, 972 203 L 972 400 C 928 381, 892 381, 848 400 Z" fill="#fefce8" stroke="#fde68a"/>
    <path d="M 972 203 C 1016 184, 1052 184, 1096 203 L 1096 400 C 1052 381, 1016 381, 972 400 Z" fill="#fff7ed" stroke="#fed7aa"/>
    <line x1="972" y1="203" x2="972" y2="400" stroke="#f59e0b" stroke-width="2"/>
    <text x="972" y="258" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="24" font-weight="700" fill="#92400e">근거 문서</text>
    <text x="972" y="296" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="16" fill="#475569">검색된 청크를</text>
    <text x="972" y="322" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="16" fill="#475569">프롬프트에 함께 제공</text>
  </g>

  <path d="M 972 428 L 972 486" stroke="#2563eb" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <rect x="806" y="500" width="332" height="54" rx="14" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="972" y="535" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="20" font-weight="700" fill="#166534">LLM은 검색된 근거를 읽고 답변한다</text>
</svg>
