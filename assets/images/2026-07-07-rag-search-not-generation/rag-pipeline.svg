<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">RAG 전체 파이프라인</title>
  <desc id="desc">문서를 적재하는 파이프라인과 사용자 질문을 처리하는 질의 파이프라인이 Vector Store를 중심으로 연결되는 구조</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1200" height="620" rx="28" fill="#f8fafc"/>
  <text x="70" y="78" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="34" font-weight="700" fill="#0f172a">RAG 전체 파이프라인</text>
  <text x="72" y="116" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="18" fill="#64748b">RAG는 문서 적재 파이프라인과 사용자 질의 파이프라인으로 나누어 볼 수 있다.</text>

  <text x="86" y="184" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">적재 파이프라인</text>
  <g filter="url(#shadow)" font-family="Arial, 'Noto Sans KR', sans-serif">
    <rect x="80" y="215" width="150" height="78" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="155" y="263" text-anchor="middle" font-size="20" font-weight="700" fill="#1d4ed8">문서</text>
    <rect x="275" y="215" width="150" height="78" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="350" y="263" text-anchor="middle" font-size="20" font-weight="700" fill="#1d4ed8">로딩</text>
    <rect x="470" y="215" width="150" height="78" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="545" y="263" text-anchor="middle" font-size="20" font-weight="700" fill="#1d4ed8">청킹</text>
    <rect x="665" y="215" width="150" height="78" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="740" y="263" text-anchor="middle" font-size="20" font-weight="700" fill="#1d4ed8">임베딩</text>
    <rect x="860" y="200" width="230" height="108" rx="18" fill="#f0fdfa" stroke="#99f6e4"/>
    <text x="975" y="248" text-anchor="middle" font-size="21" font-weight="700" fill="#115e59">Vector Store</text>
    <text x="975" y="278" text-anchor="middle" font-size="15" fill="#475569">벡터 + 원문 + metadata</text>
  </g>
  <path d="M 234 254 L 266 254" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 429 254 L 461 254" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 624 254 L 656 254" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 819 254 L 851 254" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="86" y="390" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="700" fill="#166534">질의 파이프라인</text>
  <g filter="url(#shadow)" font-family="Arial, 'Noto Sans KR', sans-serif">
    <rect x="80" y="420" width="150" height="78" rx="16" fill="#ecfdf5" stroke="#bbf7d0"/>
    <text x="155" y="468" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">질문</text>
    <rect x="275" y="420" width="170" height="78" rx="16" fill="#ecfdf5" stroke="#bbf7d0"/>
    <text x="360" y="468" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">질문 임베딩</text>
    <rect x="500" y="420" width="150" height="78" rx="16" fill="#ecfdf5" stroke="#bbf7d0"/>
    <text x="575" y="468" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">검색</text>
    <rect x="705" y="420" width="180" height="78" rx="16" fill="#ecfdf5" stroke="#bbf7d0"/>
    <text x="795" y="468" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">프롬프트 증강</text>
    <rect x="940" y="420" width="150" height="78" rx="16" fill="#ecfdf5" stroke="#bbf7d0"/>
    <text x="1015" y="468" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">LLM 답변</text>
  </g>
  <path d="M 234 459 L 266 459" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 449 459 L 491 459" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 654 459 L 696 459" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 889 459 L 931 459" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 975 315 C 975 365, 735 360, 640 420" stroke="#0f766e" stroke-width="4" fill="none" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
</svg>
